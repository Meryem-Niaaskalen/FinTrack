{% extends "base.html" %}

{% block title %}{{ title }} | FinTrack{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm">
            <div class="card-header bg-white fw-bold">
                {{ title }}
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    {% for field in form %}
                        <div class="mb-3">
                            <label for="{{ field.id_for_label }}" class="form-label">{{ field.label }}</label>
                            {{ field }}
                            {% if field.errors %}
                                <div class="text-danger small">
                                    {{ field.errors }}
                                </div>
                            {% endif %}
                        </div>
                    {% endfor %}
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary">Enregistrer</button>
                        <a href="{% url 'transaction_list' %}" class="btn btn-outline-secondary">Annuler</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    document.addEventListener('DOMContentLoaded', function() {
        const typeField = document.querySelector('select[name="type"]');
        const categoryField = document.querySelector('select[name="category"]');

        // Store all categories with their types
        const categories = [
            {% for cat in categories %}
            { id: "{{ cat.id }}", name: "{{ cat.name }}", type: "{{ cat.type }}" },
            {% endfor %}
        ];

        function filterCategories() {
            const selectedType = typeField.value;
            const currentCategory = categoryField.value;

            // Clear current options except the empty one if it exists
            const emptyOption = categoryField.querySelector('option[value=""], option:not([value])');
            categoryField.innerHTML = '';
            if (emptyOption) {
                categoryField.appendChild(emptyOption);
            } else {
                const opt = document.createElement('option');
                opt.value = '';
                opt.textContent = '---------';
                categoryField.appendChild(opt);
            }

            // Add matching categories
            categories.forEach(cat => {
                if (cat.type === selectedType) {
                    const opt = document.createElement('option');
                    opt.value = cat.id;
                    opt.textContent = cat.name;
                    if (cat.id === currentCategory) {
                        opt.selected = true;
                    }
                    categoryField.appendChild(opt);
                }
            });
        }

        if (typeField && categoryField) {
            typeField.addEventListener('change', filterCategories);
            // Initial filter
            filterCategories();
        }
    });
</script>
{% endblock %}
