{% extends "base.html" %}

{% block title %}Supprimer l'objectif | FinTrack{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm">
            <div class="card-header bg-danger text-white fw-bold">
                Confirmer la suppression
            </div>
            <div class="card-body">
                <p>Êtes-vous sûr de vouloir supprimer l'objectif <strong>{{ goal.name }}</strong> ?</p>
                <form method="post">
                    {% csrf_token %}
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-danger">Supprimer définitivement</button>
                        <a href="{% url 'goal_list' %}" class="btn btn-outline-secondary">Annuler</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
